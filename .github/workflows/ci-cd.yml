name: CI/CD Pipeline - Ticket Service

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ticket-service
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-test:
    name: Build y Pruebas Unitarias
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar proyecto
        run: mvn clean compile -q

      - name: Ejecutar pruebas unitarias con cobertura
        run: mvn test jacoco:report

      - name: Publicar reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

  security-snyk:
    name: Analisis de Seguridad (Snyk)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Instalar Maven Wrapper
        run: mvn wrapper:wrapper

      - name: Compilar para Snyk
        run: mvn clean package -DskipTests -q

      - name: Instalar y ejecutar Snyk
        run: |
          npm install -g snyk
          snyk auth $SNYK_TOKEN
          snyk test --severity-threshold=high --fail-on=upgradable || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Exportar reporte Snyk
        run: snyk test --json > snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Subir reporte Snyk
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: snyk-report.json

  sonarcloud:
    name: Analisis de Calidad (SonarCloud)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar analisis SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn verify sonar:sonar \
            -Dsonar.projectKey=ticket-service \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  docker-build-push:
    name: Build y Push imagen Docker a ECR
    runs-on: ubuntu-latest
    needs: [security-snyk, sonarcloud]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    outputs:
      image_uri: ${{ steps.build-image.outputs.image_uri }}
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar JAR
        run: mvn clean package -DskipTests -q

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Construir y publicar imagen Docker
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

  deploy:
      name: Deploy en EC2 (Docker Compose)
      runs-on: ubuntu-latest
      needs: docker-build-push
      if: github.ref == 'refs/heads/main'
      steps:
        - name: Clonar repositorio
          uses: actions/checkout@v4

        - name: Configurar credenciales AWS
          uses: aws-actions/configure-aws-credentials@v6
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
            aws-region: ${{ env.AWS_REGION }}

        - name: Deploy via SSH a EC2
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_SSH_KEY }}
            request_pty: true
            script: |
              aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
              aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
              aws configure set aws_session_token ${{ secrets.AWS_SESSION_TOKEN }}
              aws configure set default.region us-east-1
              docker logout
              docker system prune -af
              aws ecr get-login-password --region us-east-1 | \
                docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
              export IMAGE_URI=${{ needs.docker-build-push.outputs.image_uri }}
              cd ~/ticket-service
              docker pull $IMAGE_URI
              docker-compose up -d --remove-orphans
              sleep 20
              curl http://localhost:8081/ && echo "Deploy exitoso" || echo "App iniciando"
  notify:
    name: Notificacion resultado pipeline
    runs-on: ubuntu-latest
    needs: [build-and-test, security-snyk, sonarcloud, docker-build-push, deploy]
    if: always()
    steps:
      - name: Resultado del pipeline
        run: |
          if [ "${{ needs.build-and-test.result }}" == "success" ] && \
             [ "${{ needs.security-snyk.result }}" == "success" ] && \
             [ "${{ needs.sonarcloud.result }}" == "success" ]; then
            echo "Pipeline de CI completado exitosamente"
          else
            echo "Pipeline fallo - Revisar logs"
            exit 1
          fi
