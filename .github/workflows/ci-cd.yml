name: CI/CD Pipeline - Parcial 3 DevOps

on:
  push:
    branches:
      - main # Se ejecuta automáticamente al hacer push a main

jobs:
  # ==========================================
  # ETAPA 1: TEST & QUALITY (JaCoCo + SonarCloud)
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ejecutar Tests y Generar Reporte JaCoCo (IE4)
        run: mvn clean test

      - name: Analizar Calidad con SonarCloud (IE4)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar

  # ==========================================
  # ETAPA 2: BUILD & PUSH DOCKER IMAGE
  # ==========================================
  build-docker:
    needs: build-and-test 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y Subir Imagen Docker (IE2)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ticket:latest

  # ==========================================
  # ETAPA 3: DEPLOY CONTINUO A AWS EC2 VIA SSH
  # ==========================================
  deploy-ec2:
    needs: build-docker 
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar Despliegue en AWS EC2 via SSH (IE2)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: DOCKER_USERNAME
          script: |
            cd ~/monitoring
            sudo docker pull $DOCKER_USERNAME/ticket:latest
            export DOCKER_USERNAME=$DOCKER_USERNAME
            sudo -E docker-compose down
            sudo -E docker-compose up -d
            sudo docker image prune -f
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}