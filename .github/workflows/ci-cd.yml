name: CI/CD Pipeline - Parcial 3 DevOps

on:
  push:
    branches:
      - main

jobs:
  # ==========================================
  # ETAPA 1: TEST & QUALITY (JaCoCo + SonarCloud)
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ejecutar Tests y Generar Reporte JaCoCo (IE4)
        run: mvn clean test

      - name: Analizar Calidad con SonarCloud + Quality Gate (IE5/IE6)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300

  # ==========================================
  # ETAPA 2: SEGURIDAD CON SNYK (IE5/IE6) 
  # ==========================================
  security-snyk:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compilar proyecto
        run: mvn clean package -DskipTests -q

      - name: Analisis de seguridad Snyk (IE5)
        run: |
          npm install -g snyk
          snyk auth ${{ secrets.SNYK_TOKEN }}
          snyk test --file=pom.xml --package-manager=maven --json > snyk-report.json || true
          echo "Analisis Snyk completado"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Subir reporte Snyk como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-report
          path: snyk-report.json
  # ==========================================
  # ETAPA 3: BUILD & PUSH DOCKER IMAGE
  # ==========================================
  build-docker:
    needs: [build-and-test, security-snyk]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y Subir Imagen Docker (IE2)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ticket:latest

  # ==========================================
  # ETAPA 4: DEPLOY CONTINUO A AWS EC2 VIA SSH
  # ==========================================
 deploy-ec2:
    needs: build-docker
    runs-on: ubuntu-latest
    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy via SSM (IE2)
        run: |
          aws ssm send-command \
            --instance-id "i-0eba01271e0f059d4" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='["cd /home/ec2-user/monitoring && sudo docker pull ${{ secrets.DOCKER_USERNAME }}/ticket:latest && sudo DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker compose down && sudo DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker compose up -d && sudo docker image prune -f"]' \
            --region us-east-1
